<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VFBarber</title>
    <link rel="stylesheet" href="/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <div style="max-width:900px; margin: 0 auto; padding: 40px 20px 0;">
        <div class="admin-header" style="padding:0; margin-bottom:40px;">
            <div>
                <h1 style="margin:0; font-size:28px;">VFBarber</h1>
                <span style="color:#c9a24d; font-size:13px; font-weight:600;">Painel Administrativo</span>
            </div>
            <a href="/logout" class="logout-btn">Sair</a>
        </div>
    </div>

    <div class="admin-container">
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-number" th:text="${agendamentos.size()}">0</span>
                <span class="stat-label">Total de Agendamentos</span>
            </div>
        </div>

        <div class="table-card">
            <div class="table-card-header">
                <h3>Agendamentos</h3>
                <span class="badge" th:text="${agendamentos.size()}">0</span>
            </div>

            <div th:if="${agendamentos.empty}" class="empty-state">
                <p>Nenhum agendamento ainda.</p>
            </div>

            <table th:if="${!agendamentos.empty}">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Telefone</th>
                        <th>Serviço</th>
                        <th>Data / Horário</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${agendamentos}">
                        <td th:text="${a.nomeCliente}"></td>
                        <td th:text="${a.telefone}"></td>
                        <td th:text="${a.servico}"></td>
                        <td th:text="${a.dataHorario}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
